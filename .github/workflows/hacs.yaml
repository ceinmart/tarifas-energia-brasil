name: Validate HACS

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "v*"

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: integration
